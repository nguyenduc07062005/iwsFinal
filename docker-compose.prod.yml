services:
  database:
    image: pgvector/pgvector:pg16
    container_name: studyvault-prod-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-studyvault_iws}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD before running production compose}
    ports:
      - "${PROD_DATABASE_HOST_PORT:-15433}:5432"
    volumes:
      - studyvault_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-studyvault_iws}",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./studyVault-backend
      dockerfile: Dockerfile.prod
    container_name: studyvault-prod-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      CORS_ORIGIN: ${PROD_CORS_ORIGIN:-http://localhost:8080}
      FRONTEND_URL: ${PROD_FRONTEND_URL:-http://localhost:8080}
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD before running production compose}
      DATABASE_NAME: ${DATABASE_NAME:-studyvault_iws}
      DATABASE_SYNC: "false"
      DATABASE_LOGGING: ${DATABASE_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to at least 32 characters before running production compose}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      EMAIL_VERIFICATION_TTL_MINUTES: ${EMAIL_VERIFICATION_TTL_MINUTES:-1440}
      RESET_PASSWORD_TTL_MINUTES: ${RESET_PASSWORD_TTL_MINUTES:-30}
      AUTH_RETURN_RESET_TOKEN: "false"
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?Set ADMIN_BOOTSTRAP_PASSWORD before running production compose}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-"StudyVault <no-reply@studyvault.local>"}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_TEXT_MODEL_FALLBACK: ${GEMINI_TEXT_MODEL_FALLBACK:-gemini-2.0-flash}
      GEMINI_TEXT_MODEL_FALLBACKS: ${GEMINI_TEXT_MODEL_FALLBACKS:-gemini-2.0-flash,gemini-2.5-flash-lite,gemini-2.0-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
    volumes:
      - studyvault_prod_uploads:/app/uploads
    command: sh -c "node ./node_modules/typeorm/cli.js -d dist/database/data-source.js migration:run && npm run start:prod"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:8000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./studyVault-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${PROD_VITE_API_BASE_URL:-/api}
    container_name: studyvault-prod-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PROD_FRONTEND_HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  studyvault_prod_postgres_data:
  studyvault_prod_uploads:
